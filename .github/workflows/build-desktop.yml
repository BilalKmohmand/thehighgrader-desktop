name: Build Desktop Apps

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Create .env file
        run: |
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" > .env
          echo "PORT=5050" >> .env
      
      - name: Install root dependencies
        run: npm install
      
      - name: Install frontend dependencies
        run: cd welcome-hub-main && npm install
      
      - name: Debug directory structure
        run: |
          echo "=== Root directory ==="
          ls -la
          echo "=== Server directory ==="
          ls -la server/ || echo "No server dir"
          echo "=== welcome-hub-main directory ==="
          ls -la welcome-hub-main/
          echo "=== package.json build config ==="
          cat welcome-hub-main/package.json | grep -A 50 '"build"'
      
      - name: Build macOS DMG
        run: |
          cd welcome-hub-main
          npm run build 2>&1 | tee build.log
          npx electron-builder --mac dmg --publish=never 2>&1 | tee -a build.log
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      
      - name: Upload build logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: macos-build-logs
          path: welcome-hub-main/build.log
      
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: welcome-hub-main/release/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Create .env file
        shell: bash
        run: |
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" > .env
          echo "PORT=5050" >> .env
      
      - name: Install root dependencies
        run: npm install
      
      - name: Install frontend dependencies
        run: cd welcome-hub-main && npm install
      
      - name: Debug directory structure
        shell: bash
        run: |
          echo "=== Root directory ==="
          ls -la
          echo "=== Server directory ==="
          ls -la server/ || echo "No server dir"
          echo "=== welcome-hub-main directory ==="
          ls -la welcome-hub-main/
      
      - name: Build Windows EXE
        shell: bash
        run: |
          cd welcome-hub-main
          npm run build 2>&1 | tee build.log
          npx electron-builder --win nsis --publish=never 2>&1 | tee -a build.log
      
      - name: Upload build logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: windows-build-logs
          path: welcome-hub-main/build.log
      
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: welcome-hub-main/release/*.exe

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      
      - name: List artifacts
        run: ls -la artifacts/
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
